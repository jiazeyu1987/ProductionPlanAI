components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  headers:
    XRequestId:
      description: Request trace id
      schema:
        type: string

  parameters:
    UpdatedAfter:
      in: query
      name: updated_after
      required: false
      schema:
        type: string
        format: date-time
    Page:
      in: query
      name: page
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      in: query
      name: page_size
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 200

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: Authentication failed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Permission denied
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: Business conflict
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    TooManyRequests:
      description: Rate limited
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

  schemas:
    ErrorDetail:
      type: object
      properties:
        field: { type: string }
        reason: { type: string }

    ErrorResponse:
      type: object
      required: [request_id, code, message, retryable, timestamp]
      properties:
        request_id: { type: string }
        code: { type: string }
        message: { type: string }
        details:
          type: array
          items: { $ref: '#/components/schemas/ErrorDetail' }
        retryable: { type: boolean }
        timestamp: { type: string, format: date-time }

    BaseListResponse:
      type: object
      required: [request_id, page, page_size, total, items]
      properties:
        request_id: { type: string }
        page: { type: integer }
        page_size: { type: integer }
        total: { type: integer }
        items:
          type: array
          items:
            type: object

    ScheduleResultsWriteRequest:
      type: object
      required: [request_id, schedule_version, items]
      properties:
        request_id: { type: string }
        schedule_version: { type: string }
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [order_no, order_type, plan_start_time, plan_finish_time, priority, lock_flag]
            properties:
              order_no: { type: string }
              order_type: { type: string, enum: [sales, production] }
              plan_start_time: { type: string, format: date-time }
              plan_finish_time: { type: string, format: date-time }
              priority: { type: integer }
              lock_flag: { type: integer, enum: [0, 1] }

    ScheduleStatusWriteRequest:
      type: object
      required: [request_id, schedule_version, items]
      properties:
        request_id: { type: string }
        schedule_version: { type: string }
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [order_no, status]
            properties:
              order_no: { type: string }
              status: { type: string }

    ScheduleWriteResponse:
      type: object
      required: [request_id, success_count, failed_count]
      properties:
        request_id: { type: string }
        success_count: { type: integer }
        failed_count: { type: integer }

    WipLotEventRequest:
      type: object
      required: [request_id, wip_lot_id, order_no, process_code, qty, event_time]
      properties:
        request_id: { type: string }
        wip_lot_id: { type: string }
        order_no: { type: string }
        process_code: { type: string }
        qty: { type: number, minimum: 0 }
        event_time: { type: string, format: date-time }

    ReplanJobRequest:
      type: object
      required: [request_id, trigger_type, scope_type, base_version_no, reason]
      properties:
        request_id: { type: string }
        trigger_type: { type: string, enum: [DELAY, PROGRESS_GAP, EQUIPMENT_DOWN, INSERT_ORDER] }
        scope_type: { type: string, enum: [LOCAL, GLOBAL] }
        base_version_no: { type: string }
        reason: { type: string }

    AcceptedResponse:
      type: object
      required: [request_id, accepted]
      properties:
        request_id: { type: string }
        accepted: { type: boolean }
        message: { type: string }

    SalesOrderLine:
      type: object
      required: [sales_order_no, line_no, product_code, order_qty, order_date, expected_due_date, requested_ship_date, urgent_flag, order_status, last_update_time]
      properties:
        sales_order_no: { type: string }
        line_no: { type: string }
        product_code: { type: string }
        order_qty: { type: number, minimum: 0 }
        order_date: { type: string, format: date-time }
