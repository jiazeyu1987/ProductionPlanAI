name: P0 Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pandas openpyxl

      - name: Check P0 artifacts
        run: python scripts/check_artifacts.py

      - name: Validate ERP extract tool command
        run: python scripts/validate_erp_extract.py --generate-template "${{ runner.temp }}/erp_extract_template_ci.xlsx"
