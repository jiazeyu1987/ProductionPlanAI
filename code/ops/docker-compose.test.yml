services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-autoproduction}
      POSTGRES_USER: ${DB_USERNAME:-autoproduction}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-autoproduction}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - autoproduction_pg_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USERNAME:-autoproduction} -d ${DB_NAME:-autoproduction}",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - autoproduction_net

  backend:
    image: autoproduction-backend:${APP_VERSION:-latest}
    restart: unless-stopped
    environment:
      PORT: ${BACKEND_PORT:-5931}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-autoproduction}
      DB_USERNAME: ${DB_USERNAME:-autoproduction}
      DB_PASSWORD: ${DB_PASSWORD:-autoproduction}
      ERP_USE_REAL_ORDERS: ${ERP_USE_REAL_ORDERS:-false}
      ERP_SQLITE_PATH: ${ERP_SQLITE_PATH:-/data/erp/erp_recent_orders.db}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      TZ: ${TZ:-Asia/Shanghai}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - autoproduction_net

  frontend:
    image: autoproduction-frontend:${APP_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${APP_HTTP_PORT:-18080}:80"
    networks:
      - autoproduction_net

volumes:
  autoproduction_pg_data:

networks:
  autoproduction_net:
