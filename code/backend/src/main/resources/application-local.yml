spring:
  datasource:
    url: jdbc:h2:mem:autoproduction;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: none

management:
  endpoints:
    web:
      exposure:
        include: health,info

mvp:
  erp:
    base-url: ${ERP_BASE_URL:}
    acct-id: ${ERP_ACCT_ID:}
    username: ${ERP_USERNAME:}
    password: ${ERP_PASSWORD:}
    lcid: ${ERP_LCID:2052}
    timeout: ${ERP_TIMEOUT:30}
    verify-ssl: ${ERP_VERIFY_SSL:false}
