server:
  port: 5931

spring:
  profiles:
    default: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/autoproduction}
    username: ${DB_USERNAME:autoproduction}
    password: ${DB_PASSWORD:autoproduction}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Shanghai
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

mvp:
  timezone: Asia/Shanghai
  shift-hours: 12
  shifts-per-day: 2
  erp:
    base-url: ${ERP_BASE_URL:}
    acct-id: ${ERP_ACCT_ID:}
    username: ${ERP_USERNAME:}
    password: ${ERP_PASSWORD:}
    lcid: ${ERP_LCID:2052}
    timeout: ${ERP_TIMEOUT:30}
    verify-ssl: ${ERP_VERIFY_SSL:true}
    use-real-orders: ${ERP_USE_REAL_ORDERS:true}
    sqlite-path: ${ERP_SQLITE_PATH:D:/ProjectPackage/demo/erp_demo/erp_recent_orders.db}
    refresh:
      enabled: ${ERP_REFRESH_ENABLED:true}
      fixed-delay-ms: ${ERP_REFRESH_FIXED_DELAY_MS:60000}
      initial-delay-ms: ${ERP_REFRESH_INITIAL_DELAY_MS:10000}
      trigger-min-interval-ms: ${ERP_REFRESH_TRIGGER_MIN_INTERVAL_MS:5000}
      read-through-on-empty: ${ERP_REFRESH_READ_THROUGH_ON_EMPTY:true}
